<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>prototype-haskell</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #fbfbfa;
      }

      * {
        box-sizing: border-box;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      #root {
        width: 100%;
        height: 100%;
      }

      #appCanvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <canvas id="appCanvas" tabindex="0"></canvas>
    </div>
    <script type="module">
      import { WASI, OpenFile, File, ConsoleStdout }
        from "https://unpkg.com/@bjorn3/browser_wasi_shim@0.3.0/dist/index.js";
      import ghc_wasm_jsffi from "./ghc_wasm_jsffi.js";

      const canvas = document.getElementById("appCanvas");
      const context = canvas.getContext("2d");

      window.progredCanvas = {
        clear(width, height) {
          context.clearRect(0, 0, width, height);
        },
        fillRect(x, y, width, height, color) {
          context.fillStyle = color;
          context.fillRect(x, y, width, height);
        },
        strokeRect(x, y, width, height, color, lineWidth) {
          context.strokeStyle = color;
          context.lineWidth = lineWidth;
          context.strokeRect(x, y, width, height);
        },
        fillText(x, y, color, text) {
          context.fillStyle = color;
          context.font = "14px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
          context.textBaseline = "alphabetic";
          context.fillText(text, x, y);
        },
      };

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        context.setTransform(dpr, 0, 0, dpr, 0, 0);
        return rect;
      }

      const args = [];
      const env = [];
      const fds = [
        new OpenFile(new File([])),
        ConsoleStdout.lineBuffered(m => console.log(m)),
        ConsoleStdout.lineBuffered(m => console.warn(m)),
      ];
      const wasi = new WASI(args, env, fds);

      const wasm = await WebAssembly.compileStreaming(fetch("./prototype-haskell.wasm"));
      const __exports = {};
      const inst = await WebAssembly.instantiate(wasm, {
        wasi_snapshot_preview1: wasi.wasiImport,
        ghc_wasm_jsffi: ghc_wasm_jsffi(__exports),
      });
      Object.assign(__exports, inst.exports);

      wasi.initialize(inst);
      inst.exports.hs_init(0, 0);

      const initialRect = resizeCanvas();
      await inst.exports.start();
      await inst.exports.onResize(initialRect.width, initialRect.height);
      canvas.focus();

      window.addEventListener("resize", async () => {
        const rect = resizeCanvas();
        await inst.exports.onResize(rect.width, rect.height);
      });

      canvas.addEventListener("pointerdown", async event => {
        const rect = canvas.getBoundingClientRect();
        canvas.focus();
        await inst.exports.onPointerDown(event.clientX - rect.left, event.clientY - rect.top);
      });

      canvas.addEventListener("keydown", async event => {
        if (["Tab", "Enter", " ", "ArrowLeft", "ArrowUp", "ArrowRight", "ArrowDown"].includes(event.key)) {
          event.preventDefault();
          await inst.exports.onKeyDown(event.keyCode);
        }
      });
    </script>
  </body>
</html>
