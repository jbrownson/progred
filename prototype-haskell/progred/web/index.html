<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>prototype-haskell</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #fbfbfa;
      }

      * {
        box-sizing: border-box;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }
    </style>
  </head>
  <body>
    <canvas tabindex="0"></canvas>
    <script type="module">
      import { WASI, OpenFile, File, ConsoleStdout }
        from "./vendor/browser_wasi_shim/index.js";
      import ghc_wasm_jsffi from "./ghc_wasm_jsffi.js";

      const canvas = document.querySelector("canvas");
      const context = canvas.getContext("2d");
      const measureContext = document.createElement("canvas").getContext("2d");
      const textFont = "14px system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";

      window.puriCanvas = {
        clear(width, height) {
          context.clearRect(0, 0, width, height);
        },
        save() {
          context.save();
        },
        restore() {
          context.restore();
        },
        translate(x, y) {
          context.translate(x, y);
        },
        scale(x, y) {
          context.scale(x, y);
        },
        clipRect(x, y, width, height) {
          context.beginPath();
          context.rect(x, y, width, height);
          context.clip();
        },
        fillRect(x, y, width, height, color) {
          context.fillStyle = color;
          context.fillRect(x, y, width, height);
        },
        strokeRect(x, y, width, height, color, lineWidth) {
          context.strokeStyle = color;
          context.lineWidth = lineWidth;
          context.strokeRect(x, y, width, height);
        },
        strokeLine(x1, y1, x2, y2, color, lineWidth) {
          context.strokeStyle = color;
          context.lineWidth = lineWidth;
          context.beginPath();
          context.moveTo(x1, y1);
          context.lineTo(x2, y2);
          context.stroke();
        },
        fillText(x, y, color, text) {
          context.fillStyle = color;
          context.font = textFont;
          context.textBaseline = "alphabetic";
          context.fillText(text, x, y);
        },
        fillTextMiddle(x, y, color, text) {
          context.fillStyle = color;
          context.font = textFont;
          context.textBaseline = "middle";
          context.fillText(text, x, y);
        },
        measureTextMetrics(text) {
          measureContext.font = textFont;
          return measureContext.measureText(text);
        },
        measureText(text) {
          return this.measureTextMetrics(text).width;
        },
        measureTextActualAscent(text) {
          return this.measureTextMetrics(text).actualBoundingBoxAscent ?? 0;
        },
        measureTextActualDescent(text) {
          return this.measureTextMetrics(text).actualBoundingBoxDescent ?? 0;
        },
        measureTextFontAscent(text) {
          const metrics = this.measureTextMetrics(text);
          return metrics.fontBoundingBoxAscent ?? metrics.actualBoundingBoxAscent ?? 0;
        },
        measureTextFontDescent(text) {
          const metrics = this.measureTextMetrics(text);
          return metrics.fontBoundingBoxDescent ?? metrics.actualBoundingBoxDescent ?? 0;
        },
        width() {
          return canvas.getBoundingClientRect().width;
        },
        height() {
          return canvas.getBoundingClientRect().height;
        },
      };

      function resizeCanvas() {
        const rect = canvas.getBoundingClientRect();
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        context.setTransform(dpr, 0, 0, dpr, 0, 0);
        return rect;
      }

      const args = [];
      const env = [];
      const fds = [
        new OpenFile(new File([])),
        ConsoleStdout.lineBuffered(m => console.log(m)),
        ConsoleStdout.lineBuffered(m => console.warn(m)),
      ];
      const wasi = new WASI(args, env, fds);

      const wasm = await WebAssembly.compileStreaming(fetch("./prototype-haskell.wasm"));
      const __exports = {};
      const inst = await WebAssembly.instantiate(wasm, {
        wasi_snapshot_preview1: wasi.wasiImport,
        ghc_wasm_jsffi: ghc_wasm_jsffi(__exports),
      });
      Object.assign(__exports, inst.exports);

      wasi.initialize(inst);
      inst.exports.hs_init(0, 0);

      // All Haskell exports are synchronous ("sync" JSFFI exports), so a
      // full event dispatch + re-render completes within one JS task and the
      // browser only ever paints finished frames.
      const initialRect = resizeCanvas();
      inst.exports.start();
      inst.exports.onResize(initialRect.width, initialRect.height);
      canvas.focus();

      function toggleLayoutDebugRects() {
        inst.exports.toggleLayoutDebugRects();
      }

      function toggleGraphView() {
        inst.exports.toggleGraphView();
      }

      function animationFrame() {
        inst.exports.onAnimationFrame();
        requestAnimationFrame(animationFrame);
      }
      requestAnimationFrame(animationFrame);

      function eventModifiers(event) {
        return [
          event.shiftKey ? 1 : 0,
          event.altKey ? 1 : 0,
          event.ctrlKey ? 1 : 0,
          event.metaKey ? 1 : 0,
        ];
      }

      window.progred = {
        ...(window.progred ?? {}),
        toggleGraphView,
        toggleLayoutDebugRects,
      };

      window.addEventListener("resize", () => {
        const rect = resizeCanvas();
        inst.exports.onResize(rect.width, rect.height);
      });

      canvas.addEventListener("pointerdown", event => {
        const rect = canvas.getBoundingClientRect();
        canvas.focus();
        canvas.setPointerCapture(event.pointerId);
        inst.exports.onPointerDown(event.clientX - rect.left, event.clientY - rect.top, ...eventModifiers(event));
      });

      canvas.addEventListener("pointermove", event => {
        if (!canvas.hasPointerCapture(event.pointerId)) return;
        const rect = canvas.getBoundingClientRect();
        inst.exports.onPointerMove(event.clientX - rect.left, event.clientY - rect.top, ...eventModifiers(event));
      });

      canvas.addEventListener("pointerup", event => {
        const rect = canvas.getBoundingClientRect();
        if (canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }
        inst.exports.onPointerUp(event.clientX - rect.left, event.clientY - rect.top, ...eventModifiers(event));
      });

      canvas.addEventListener("wheel", event => {
        event.preventDefault();
        const rect = canvas.getBoundingClientRect();
        inst.exports.onWheel(
          event.clientX - rect.left,
          event.clientY - rect.top,
          event.deltaX,
          event.deltaY,
          event.deltaMode,
          ...eventModifiers(event),
        );
      }, { passive: false });

      canvas.addEventListener("keydown", event => {
        if ((event.metaKey || event.ctrlKey) && event.shiftKey && event.key.toLowerCase() === "d") {
          event.preventDefault();
          toggleLayoutDebugRects();
          return;
        }

        if ((event.metaKey || event.ctrlKey) && event.shiftKey && event.key.toLowerCase() === "g") {
          event.preventDefault();
          toggleGraphView();
          return;
        }

        if (!event.metaKey && !event.ctrlKey && event.key.length === 1 && event.key !== " ") {
          event.preventDefault();
          inst.exports.onTextInput(event.key);
          return;
        }

        if (["Tab", "Enter", "Escape", " ", "Backspace", "Delete", "Home", "End", "ArrowLeft", "ArrowUp", "ArrowRight", "ArrowDown"].includes(event.key)) {
          event.preventDefault();
          inst.exports.onKeyDown(
            event.keyCode,
            ...eventModifiers(event),
          );
        }
      });
    </script>
  </body>
</html>
